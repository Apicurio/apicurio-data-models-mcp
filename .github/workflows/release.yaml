name: Release
on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Version being released (e.g., 1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release Apicurio Data Models MCP
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "apicurio-ci"
          git config --global user.email "apicurio.ci@gmail.com"

      - name: Set release version in package.json
        run: |
          npm version ${{ github.event.inputs.release-version }} --no-git-tag-version
          git add package.json
          git commit -m "Update version to ${{ github.event.inputs.release-version }}"

      - name: Build and Test Project
        run: |
          npm install
          npm run lint
          npm run build
          npm run test

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          npm publish --access public

      - name: Push Version Change
        run: |
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.release-version }}
          name: ${{ github.event.inputs.release-version }}
          draft: false
          prerelease: >-
            ${{ contains(github.event.inputs.release-version, 'RC')
             || contains(github.event.inputs.release-version, 'alpha')
             || contains(github.event.inputs.release-version, 'beta') }}
          generate_release_notes: true

      - name: Slack Notification (Always)
        if: always()
        run: |
          MESSAGE="'${{ github.workflow }}/${{ github.job }}' completed: ${{ job.status }}"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}

      - name: Slack Notification (Error)
        if: failure()
        run: |
          MESSAGE="'${{ github.workflow }}/${{ github.job }}' job FAILED!"
          REPO="${{ github.repository }}"
          LINK="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
          PAYLOAD="{\"workflow\": \"${{ github.workflow }}\", \"status\": \"${{ job.status }}\", \"message\": \"$MESSAGE\", \"link\": \"$LINK\", \"repository\": \"$REPO\"}"
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" ${{ secrets.SLACK_ERROR_WEBHOOK }}
